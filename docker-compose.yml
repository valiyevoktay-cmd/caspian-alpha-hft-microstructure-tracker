version: '3.8'

services:
  backend:
    build: .
    container_name: caspian_backend
    command: python main.py
    # Mount the current directory so SQLite DB is shared and saved locally
    volumes:
      - .:/app
    restart: unless-stopped

  frontend:
    build: .
    container_name: caspian_frontend
    # Run Streamlit and expose it to the host machine
    command: streamlit run ui/dashboard.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped