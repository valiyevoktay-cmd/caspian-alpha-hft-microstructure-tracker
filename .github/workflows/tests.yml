name: Caspian Alpha CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. 
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. 
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # 4. 
    - name: Run Quantitative Engine Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v